<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math2LaTeX AI 工作流</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
        /* ================= 全局基础与毛玻璃样式 ================= */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            background-color: #007bff; 
            background-image: linear-gradient(to bottom right, #007bff, #20c997);
            padding: 40px 20px;
            box-sizing: border-box;
            gap: 30px; 
        }

        .card-base {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 900px; 
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            padding: 30px;
            box-sizing: border-box;
        }

        .card-base:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card-title {
            margin-top: 0;
            font-size: 1.8em;
            color: #f0f0f0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* ================= 模块一：AI 识别区 ================= */
        /* 将原本的 div 样式适配给 input 元素 */
        input.instruction-text {
            font-size: 1.1em;
            text-shadow: 0 0 5px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            background: rgba(0,0,0,0.15);
            padding: 15px;
            border-radius: 10px;
            border: 1px dashed rgba(255,255,255,0.4);
            width: 100%;
            box-sizing: border-box;
            color: #fff;
            outline: none;
            text-align: center;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        
        input.instruction-text::placeholder {
            color: rgba(255, 255, 255, 0.8);
        }

        input.instruction-text:focus {
            background: rgba(0,0,0,0.25);
            border-color: rgba(255,255,255,0.8);
        }

        #file-input { display: none; }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap; 
        }

        .action-button {
            background: rgba(80, 150, 220, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 12px 25px;
            font-size: 1.1em;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-button:hover:not(:disabled) {
            background: rgba(80, 150, 220, 0.6);
            transform: translateY(-2px);
        }
        
        .action-button:disabled {
            background: rgba(150, 150, 150, 0.3);
            cursor: not-allowed;
            color: rgba(255,255,255,0.5);
            transform: none;
        }

        .action-button.primary {
            background: rgba(46, 204, 113, 0.5); 
        }
        .action-button.primary:hover:not(:disabled) {
            background: rgba(46, 204, 113, 0.7);
        }

        #image-preview-container {
            display: none;
            margin-bottom: 20px;
            position: relative;
            border-radius: 10px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #image-preview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .remove-img-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(220, 80, 80, 0.9);
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .remove-img-btn:hover { transform: scale(1.1); }

        /* ================= 模块二：原生渲染区 ================= */
        #render-card {
            display: none;
            opacity: 0;
            animation: fadeIn 0.4s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .render-workflow {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .latex-input-container {
            position: relative;
            width: 100%;
        }

        textarea#latex-input {
            width: 100%;
            min-height: 80px; 
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: #fff;
            padding: 15px 15px 45px 15px; 
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 1.1em;
            box-sizing: border-box;
            resize: none; 
            overflow: hidden; 
            outline: none;
            transition: border-color 0.3s;
        }

        textarea#latex-input:focus {
            border-color: rgba(255,255,255,0.8);
            background: rgba(0, 0, 0, 0.5);
        }

        .copy-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.9em;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.4); }

        .render-viewport {
            background: #ffffff; 
            border-radius: 10px;
            min-height: 100px;
            overflow-x: auto; 
            overflow-y: hidden; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.1);
            border: 2px solid rgba(0,0,0,0.1);
            display: block; 
        }

        .export-wrapper {
            background: #ffffff; 
            color: #000000; 
            padding: 30px 40px; 
            font-size: 1.6em; 
            min-width: 100%; 
            width: max-content; 
            box-sizing: border-box;
            display: block; 
            text-align: center; 
        }

        .render-actions {
            display: none; 
            justify-content: flex-end;
            margin-top: -5px;
        }

        .download-img-btn {
            background: rgba(46, 204, 113, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 8px 18px;
            font-size: 1em;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .download-img-btn:hover {
            background: rgba(46, 204, 113, 0.7);
            transform: translateY(-2px);
        }

        .download-img-btn:active {
            transform: scale(0.95);
        }

        /* ================= Toast 通知 ================= */
        #toast-notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(46, 204, 113, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 12px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            font-size: 1.1em;
            font-weight: bold;
            z-index: 9999;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            visibility: hidden;
            white-space: nowrap;
        }

        #toast-notification.show { top: 30px; opacity: 1; visibility: visible; }
        #toast-notification.error { background: rgba(231, 76, 60, 0.9); }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="toast-notification"></div>

    <div class="card-base">
        <h2 class="card-title">🔍 AI 公式识别</h2>
        
        <input type="text" class="instruction-text" id="custom-prompt" placeholder="在此输入文字；或无需点击按钮，在页面任何位置按 Ctrl + V 粘贴截图">

        <div class="btn-group">
            <button class="action-button" id="browse-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                手动选择图片
            </button>
            <button class="action-button" id="toggle-render-btn">
                ✍️ 打开渲染器
            </button>
            <button class="action-button primary" id="convert-btn" disabled>
                <span id="btn-text">✨ 识别并导入渲染器</span>
                <div class="spinner" id="loading-spinner"></div>
            </button>
        </div>
        <input type="file" id="file-input" accept="image/png, image/jpeg, image/webp">

        <div id="image-preview-container">
            <button class="remove-img-btn" id="remove-img-btn" title="移除图片">✕</button>
            <img id="image-preview" src="" alt="截图预览">
        </div>
    </div>

    <div class="card-base" id="render-card">
        <h2 class="card-title">📝 实时 LaTeX 渲染 (KaTeX)</h2>
        
        <div class="render-workflow">
            <div class="latex-input-container">
                <textarea id="latex-input" placeholder="输入 LaTeX 代码，或等待上方 AI 填充..."></textarea>
                <button class="copy-btn" id="copy-btn">复制文本</button>
            </div>

            <div class="render-viewport">
                <div class="export-wrapper" id="latex-render-area">
                    <span style="color: #999; font-size: 0.7em;">公式实时预览区</span>
                </div>
            </div>
            
            <div class="render-actions" id="render-actions">
                <a href="#" class="download-img-btn" id="download-img-btn" target="_blank" rel="noopener noreferrer">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    打开 PNG 并保存
                </a>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "AIzaSyBMMD7uziauJWXAhMfnpMMZpHysaQRsx7s"; 
        const staticPrefix = "\\inline&space;\\huge&space;\\dpi{110}\\color{black}"; 
        const pngBaseURL = "https://latex.codecogs.com/png.image?";

        const fileInput = document.getElementById('file-input');
        const customPrompt = document.getElementById('custom-prompt');
        const browseBtn = document.getElementById('browse-btn');
        const toggleRenderBtn = document.getElementById('toggle-render-btn');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const removeImgBtn = document.getElementById('remove-img-btn');
        const convertBtn = document.getElementById('convert-btn');
        const btnText = document.getElementById('btn-text');
        const loadingSpinner = document.getElementById('loading-spinner');
        
        const renderCard = document.getElementById('render-card');
        const latexInput = document.getElementById('latex-input');
        const latexRenderArea = document.getElementById('latex-render-area');
        const renderActions = document.getElementById('render-actions');
        const downloadImgBtn = document.getElementById('download-img-btn'); 
        const copyBtn = document.getElementById('copy-btn');
        const toastNotification = document.getElementById('toast-notification');

        let currentBase64Image = null;
        let currentMimeType = null;

        function showToast(message, isError = false) {
            toastNotification.textContent = message;
            toastNotification.className = isError ? 'error show' : 'show';
            setTimeout(() => { toastNotification.classList.remove('show'); }, 3000);
        }

        // 判断提交按钮是否应该启用（有图片，或者有文字，都可以启用）
        function updateConvertBtnState() {
            convertBtn.disabled = !currentBase64Image && customPrompt.value.trim() === '';
        }

        customPrompt.addEventListener('input', updateConvertBtnState);

        function loadAndPreviewImage(file) {
            if (!file || !file.type.startsWith('image/')) {
                showToast("未能识别为有效图片", true);
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                currentBase64Image = e.target.result.split(',')[1];
                currentMimeType = file.type;
                imagePreview.src = e.target.result;
                imagePreviewContainer.style.display = 'block';
                updateConvertBtnState();
                showToast("图片已捕获，可选择补充文字或直接识别");
            };
            reader.readAsDataURL(file);
        }

        window.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file' && item.type.startsWith('image/')) {
                    loadAndPreviewImage(item.getAsFile());
                    return;
                }
            }
        });

        browseBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) loadAndPreviewImage(e.target.files[0]);
        });

        removeImgBtn.addEventListener('click', () => {
            currentBase64Image = null;
            imagePreviewContainer.style.display = 'none';
            fileInput.value = ""; 
            updateConvertBtnState();
        });

        toggleRenderBtn.addEventListener('click', () => {
            if (renderCard.style.display === 'none' || renderCard.style.display === '') {
                renderCard.style.display = 'block';
                latexInput.focus();
                renderCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                renderCard.style.display = 'none';
            }
        });

        function autoResizeTextarea(el) {
            el.style.height = 'auto'; 
            el.style.height = (el.scrollHeight) + 'px'; 
        }

        function updateRenderArea() {
            autoResizeTextarea(latexInput);

            const rawLatex = latexInput.value.trim();
            if (!rawLatex) {
                latexRenderArea.innerHTML = '<span style="color: #999; font-size: 0.7em;">公式实时预览区</span>';
                renderActions.style.display = 'none'; 
                downloadImgBtn.href = "#";
                return;
            }

            let cleanLatex = rawLatex
                .replace(/```latex/g, '').replace(/```math/g, '').replace(/```/g, '').trim();

            if (cleanLatex.includes('\n') && !cleanLatex.includes('\\begin{')) {
                let lines = cleanLatex.split('\n').map(line => line.trim()).filter(line => line.length > 0);
                
                if (lines.length > 1) {
                    let processedLines = lines.map(line => {
                        if (!line.includes('&') && line.indexOf('=') !== -1) {
                            return line.replace('=', '&=');
                        }
                        return line;
                    });
                    
                    processedLines = processedLines.map((line, index) => {
                         let cleanLine = line.replace(/\\\\$/, '').trim(); 
                         if (index < processedLines.length - 1) {
                             return cleanLine + ' \\\\';
                         }
                         return cleanLine;
                    });

                    cleanLatex = "\\begin{aligned}\n" + processedLines.join('\n') + "\n\\end{aligned}";
                }
            }

            try {
                if (window.katex) {
                    katex.render(cleanLatex, latexRenderArea, {
                        throwOnError: false, 
                        displayMode: true, 
                        strict: false 
                    });
                    
                    const encodedInput = encodeURIComponent(cleanLatex);
                    downloadImgBtn.href = pngBaseURL + staticPrefix + encodedInput;

                    renderActions.style.display = 'flex'; 
                }
            } catch (err) {
                latexRenderArea.innerHTML = `<span style="color: red; font-size: 0.8em;">渲染错误: ${err.message}</span>`;
                renderActions.style.display = 'none';
                downloadImgBtn.href = "#";
            }
        }

        latexInput.addEventListener('input', updateRenderArea);

        convertBtn.addEventListener('click', async () => {
            const userText = customPrompt.value.trim();
            if (!currentBase64Image && !userText) return; // 再次拦截空提交

            convertBtn.disabled = true;
            btnText.style.display = 'none';
            loadingSpinner.style.display = 'block';

            // 根据用户输入动态构建 Prompt
            let instructionText = "Extract the mathematical formula from this image. Output ONLY the raw LaTeX code without any markdown or explanations.";
            
            if (!currentBase64Image) {
                instructionText = "Convert the following request into pure LaTeX code. Output ONLY the raw LaTeX code without any markdown or explanations.\nRequest: " + userText;
            } else if (userText) {
                instructionText = "Extract the mathematical formula from this image and strictly follow these user instructions: " + userText + ". Output ONLY the raw LaTeX code without any markdown or explanations.";
            }

            const apiParts = [{ text: instructionText }];
            if (currentBase64Image) {
                apiParts.push({ inlineData: { mimeType: currentMimeType || "image/jpeg", data: currentBase64Image } });
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;

            const payload = {
                contents: [{
                    role: "user",
                    parts: apiParts
                }]
            };

            try {
                let response = null;
                const maxRetries = 5;
                const delays = [1000, 2000, 4000, 8000, 16000];
                
                for(let i=0; i < maxRetries; i++) {
                     try {
                         const fetchRes = await fetch(url, {
                             method: 'POST',
                             headers: { 'Content-Type': 'application/json' },
                             body: JSON.stringify(payload)
                         });
                         
                         if(fetchRes.ok) {
                             response = await fetchRes.json();
                             break;
                         } else throw new Error(`HTTP Error: ${fetchRes.status}`);
                     } catch (e) {
                         if (i === maxRetries - 1) throw e;
                         await new Promise(res => setTimeout(res, delays[i]));
                     }
                }

                if (response && response.candidates && response.candidates[0].content.parts[0].text) {
                    renderCard.style.display = 'block';
                    
                    latexInput.value = response.candidates[0].content.parts[0].text;
                    updateRenderArea();
                    showToast("✅ 识别并渲染成功");
                    
                    renderCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    throw new Error("识别结果为空");
                }
            } catch (error) {
                console.error("API Error:", error);
                showToast(`❌ 识别出错: ${error.message}`, true);
            } finally {
                updateConvertBtnState(); // 恢复按钮状态
                btnText.style.display = 'inline';
                loadingSpinner.style.display = 'none';
            }
        });

        copyBtn.addEventListener('click', () => {
            latexInput.select();
            document.execCommand('copy');
            showToast("已复制到剪贴板");
        });

    </script>
</body>
</html>
